services:
  # Backend Web Service
  - type: web
    name: finpulse-backend
    env: node
    region: ohio
    plan: free
    rootDir: finpulse-web/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: finpulse-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVEDATA_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false

  # Frontend Static Site
  - type: web
    name: finpulse-frontend
    runtime: static
    rootDir: finpulse-web
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: finpulse-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
